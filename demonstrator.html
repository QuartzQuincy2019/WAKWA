<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAKWA 加密器 · 步骤演示</title>
  <link rel="stylesheet" href="general.css">
  <script src="doublecode.js"></script>
  <script src="triplecode.js"></script>
  <style>
    /* 演示页特有样式 */
    .container {
      max-width: 1300px;
    }

    .config-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .config-item {
      flex: 1 1 200px;
    }

    .section-title {
      font-weight: 600;
      margin: 24px 0 12px;
      font-size: 1.1em;
    }

    /* 参数表格 */
    .param-table {
      width: 100%;
      border-collapse: collapse;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.9em;
    }

    .param-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #e2e8f0;
    }

    .param-table td:first-child {
      font-weight: 600;
      width: 200px;
      background: #f1f5f9;
    }

    .param-table tr:last-child td {
      border-bottom: none;
    }

    /* 字体大小控制 */
    .font-size-control {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .font-size-control input[type="range"] {
      width: 150px;
    }

    /* 步骤表格 */
    #demonstrator {
      overflow-x: auto;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      margin-top: 12px;
      background: #fff;
    }

    table.steps {
      border-collapse: collapse;
      min-width: 100%;
      white-space: nowrap;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    table.steps th,
    table.steps td {
      border: 1px solid #e2e8f0;
      padding: 6px 10px;
      text-align: center;
      font-size: inherit;
    }

    table.steps th {
      background: #f1f5f9;
      font-weight: 600;
      color: #334155;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .row-label {
      background: #f8fafc;
      font-weight: 600;
      text-align: left;
      position: sticky;
      left: 0;
      background: #f1f5f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .mapped-cell {
      font-weight: 500;
      color: #0f172a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔍 WAKWA 加密器 · 步骤演示</h1>
    <div>返回 <a class="redirect-link" href="./98.html" target="_self">主界面</a></div>
    <div class="subtitle">盐仅在密码变更时刷新，便于对比中间值</div>

    <div class="config-row">
      <div class="config-item">
        <label>🔑 密码</label>
        <input type="text" id="passwordInput" placeholder="输入密码" autocomplete="off">
      </div>
      <div class="config-item">
        <label>📝 明文 (≤100 字符)</label>
        <textarea id="plaintextInput" maxlength="100" placeholder="输入要加密的文本"></textarea>
      </div>
      <div class="config-item" style="flex:0 0 auto;">
        <label>映射模式</label>
        <div class="radio-group">
          <label><input type="radio" name="demoMode" value="TM" checked> TM (三码)</label>
          <label><input type="radio" name="demoMode" value="DM"> DM (二码)</label>
        </div>
        <div class="checkbox-option" style="margin-top:8px;">
          <label><input type="checkbox" id="shuffleCheck" checked> 打乱映射表</label>
        </div>
      </div>
    </div>

    <!-- 派生参数表格 -->
    <div class="section-title">🔧 派生参数（基于密码 + 当前盐）</div>
    <table class="param-table" id="paramsTable">
      <tbody>
        <tr>
          <td>盐 (salt)</td>
          <td id="paramSalt">—</td>
        </tr>
        <tr>
          <td>eliminated</td>
          <td id="paramElim">—</td>
        </tr>
        <tr>
          <td>字母表 (24字符)</td>
          <td id="paramLetters">—</td>
        </tr>
        <tr>
          <td>addition</td>
          <td id="paramAddition">—</td>
        </tr>
        <tr>
          <td>pointer</td>
          <td id="paramPointer">—</td>
        </tr>
        <tr>
          <td>producer</td>
          <td id="paramProducer">—</td>
        </tr>
        <tr>
          <td>leftIntroducer</td>
          <td id="paramLeft">—</td>
        </tr>
        <tr>
          <td>rightIntroducer</td>
          <td id="paramRight">—</td>
        </tr>
        <tr>
          <td>step (未使用)</td>
          <td id="paramStep">—</td>
        </tr>
        <tr>
          <td>映射模式</td>
          <td id="paramMode">—</td>
        </tr>
        <tr>
          <td>映射表</td>
          <td id="paramShuffle">—</td>
        </tr>
      </tbody>
    </table>

    <!-- 加密步骤展示 -->
    <div class="section-title">📊 加密过程</div>
    <div class="font-size-control">
      <span>字体大小:</span>
      <input type="range" id="fontSizeSlider" min="8" max="40" value="18" step="2">
      <span id="fontSizeValue">18px</span>
    </div>
    <div id="demonstrator">
      <p style="padding:16px; color:#888;">请在上方输入密码和明文</p>
    </div>
  </div>

  <script>
    (function () {
      // ---------- 工具函数 ----------
      const bytesToHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
      function mulberry32(seed) {
        return () => {
          seed |= 0; seed = (seed + 0x6d2b79f5) | 0;
          let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
          t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
      }
      const uint32FromBytes = bytes => new DataView(bytes.buffer, bytes.byteOffset, 4).getUint32(0, true);
      const shuffleArray = (arr, rand) => {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      };
      function primesInRange(min, max) {
        const sieve = new Uint8Array(max + 1).fill(1);
        sieve[0] = sieve[1] = 0;
        for (let i = 2; i * i <= max; i++) if (sieve[i]) for (let j = i * i; j <= max; j += i) sieve[j] = 0;
        const res = [];
        for (let i = min; i <= max; i++) if (sieve[i]) res.push(i);
        return res;
      }
      const P_1000_9999 = primesInRange(1000, 9999);
      const P_100000_999999 = primesInRange(100000, 999999);
      const P_50_600 = primesInRange(50, 600);
      const LETTERS_ALL = 'abcdefghijklmnopqrstuvwxy';
      const MOD = 2n ** 27n;

      function toBase24Fixed6(value, letters) {
        const ZERO = letters[0];
        let digits = '', v = value;
        for (let i = 0; i < 6; i++) {
          const rem = Number(v % 24n);
          digits = letters[rem] + digits;
          v = v / 24n;
        }
        return digits;
      }

      // 洗牌映射
      function shuffleMap(originalMap, seedBytes) {
        const keys = Object.keys(originalMap);
        const values = keys.map(k => originalMap[k]);
        const rand = mulberry32(uint32FromBytes(seedBytes));
        const shuffled = shuffleArray([...values], rand);
        const map = {};
        keys.forEach((k, idx) => { map[k] = shuffled[idx]; });
        return map;
      }

      // ---------- 密码派生（支持是否打乱映射）----------
      async function deriveParams(password, salt, mode, doShuffle) {
        const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
        const masterBits = await crypto.subtle.deriveBits(
          { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
          keyMaterial, 256
        );
        const masterKeyBytes = new Uint8Array(masterBits);
        const hkdfKey = await crypto.subtle.importKey('raw', masterKeyBytes, 'HKDF', false, ['deriveBits']);
        const enc = new TextEncoder();
        const derive = async (info) => {
          const bits = await crypto.subtle.deriveBits(
            { name: 'HKDF', hash: 'SHA-256', salt, info: enc.encode(info) },
            hkdfKey, 256
          );
          return new Uint8Array(bits);
        };
        const [elimS, ascS, weaveS, stepS, kgmS, mapS] = await Promise.all([
          derive('eliminated'), derive('ascending'), derive('weaving'),
          derive('step'), derive('kgm'), derive('map')
        ]);

        const eliminated = LETTERS_ALL[elimS[0] % 25];
        const letters = LETTERS_ALL.replace(eliminated, '');
        const ascView = new DataView(ascS.buffer);
        const idxAdd = ascView.getUint16(0, true) % P_1000_9999.length;
        const addition = BigInt(P_1000_9999[idxAdd]);
        const idxPtr = ascView.getUint16(2, true) % P_1000_9999.length;
        let pointer = BigInt(P_1000_9999[idxPtr]);
        while (pointer === addition) pointer = BigInt(P_1000_9999[(idxPtr + 1) % P_1000_9999.length]);
        const idxProd = ascView.getUint16(4, true) % P_100000_999999.length;
        let producer = BigInt(P_100000_999999[idxProd]);
        while (producer === addition || producer === pointer) producer = BigInt(P_100000_999999[(idxProd + 1) % P_100000_999999.length]);

        const weaveView = new DataView(weaveS.buffer);
        let leftIntroducer = BigInt((weaveView.getUint32(0, true) % 0x7FFFFF) + 1);
        let rightIntroducer = BigInt((weaveView.getUint32(4, true) % 0x7FFFFF) + 1);
        while (leftIntroducer === rightIntroducer) rightIntroducer = BigInt((Number(rightIntroducer) % 0x7FFFFF) + 1);

        const step = P_50_600[stepS[0] % P_50_600.length];

        // 根据选项决定是否打乱映射表
        let mappingTable;
        if (doShuffle) {
          mappingTable = mode === 'DM' ? shuffleMap(DOUBLE_CODES, mapS) : shuffleMap(TRIPLE_CODES, mapS);
        } else {
          mappingTable = mode === 'DM' ? { ...DOUBLE_CODES } : { ...TRIPLE_CODES };
        }

        return {
          saltHex: bytesToHex(salt),
          eliminated, letters,
          addition, pointer, producer,
          leftIntroducer, rightIntroducer,
          step, mappingTable, mode, doShuffle
        };
      }

      // 加密步骤（无KGM）
      function computeSteps(plaintext, params) {
        const { letters, addition, pointer, producer, leftIntroducer, rightIntroducer, mappingTable, mode } = params;
        const chars = [...plaintext];
        if (chars.length === 0) return [];
        const A = chars.map((ch, idx) => {
          const uIndex = BigInt(ch.codePointAt(0));
          const idxBig = BigInt(idx + 1);
          return (uIndex * pointer + addition + producer * idxBig) % MOD;
        });
        const Ac = new Array(A.length);
        Ac[0] = A[0] ^ leftIntroducer;
        for (let i = 1; i < A.length; i++) Ac[i] = Ac[i - 1] ^ A[i];
        const Ad = new Array(Ac.length);
        const last = Ac.length - 1;
        Ad[last] = Ac[last] ^ rightIntroducer;
        for (let i = last; i > 0; i--) Ad[i - 1] = Ad[i] ^ Ac[i - 1];

        const steps = [];
        for (let i = 0; i < chars.length; i++) {
          const codePoint = chars[i].codePointAt(0);
          const unicodeHex = codePoint.toString(16).toUpperCase().padStart(4, '0');
          const base24 = toBase24Fixed6(Ad[i], letters);
          const codeUnits = [];
          if (mode === 'DM') {
            for (let j = 0; j < 6; j += 2) codeUnits.push(base24.slice(j, j + 2));
          } else {
            for (let j = 0; j < 6; j += 3) codeUnits.push(base24.slice(j, j + 3));
          }
          const mapped = codeUnits.map(unit => mappingTable[unit] || '?');

          steps.push({
            index: i + 1,
            char: chars[i],
            unicode: unicodeHex,
            uIndex: BigInt(codePoint).toString(),
            newIndex: A[i].toString(),
            Ad: Ad[i].toString(),
            base24,
            codeUnits,
            mapped
          });
        }
        return steps;
      }

      // ---------- UI 绑定 ----------
      const passwordInput = document.getElementById('passwordInput');
      const plaintextInput = document.getElementById('plaintextInput');
      const demonstrator = document.getElementById('demonstrator');
      const modeRadios = document.getElementsByName('demoMode');
      const shuffleCheck = document.getElementById('shuffleCheck');
      const fontSizeSlider = document.getElementById('fontSizeSlider');
      const fontSizeValue = document.getElementById('fontSizeValue');

      const paramCells = {
        salt: document.getElementById('paramSalt'),
        elim: document.getElementById('paramElim'),
        letters: document.getElementById('paramLetters'),
        addition: document.getElementById('paramAddition'),
        pointer: document.getElementById('paramPointer'),
        producer: document.getElementById('paramProducer'),
        left: document.getElementById('paramLeft'),
        right: document.getElementById('paramRight'),
        step: document.getElementById('paramStep'),
        mode: document.getElementById('paramMode'),
        shuffle: document.getElementById('paramShuffle')
      };

      let lastPassword = '';
      let currentSalt = null;

      function getMode() {
        for (const r of modeRadios) if (r.checked) return r.value;
        return 'TM';
      }

      let updateTimer;
      async function updateDisplay() {
        const password = passwordInput.value;
        const plaintext = plaintextInput.value.slice(0, 100);
        const mode = getMode();
        const doShuffle = shuffleCheck.checked;

        if (password !== lastPassword) {
          currentSalt = crypto.getRandomValues(new Uint8Array(16));
          lastPassword = password;
        }

        if (!password || !plaintext) {
          paramCells.salt.textContent = currentSalt ? bytesToHex(currentSalt) : '—';
          for (const key of ['elim', 'letters', 'addition', 'pointer', 'producer', 'left', 'right', 'step']) {
            paramCells[key].textContent = '—';
          }
          paramCells.mode.textContent = mode;
          paramCells.shuffle.textContent = doShuffle ? '打乱' : '原始';
          demonstrator.innerHTML = '<p style="padding:16px; color:#888;">请在上方输入密码和明文</p>';
          return;
        }

        try {
          const params = await deriveParams(password, currentSalt, mode, doShuffle);
          paramCells.salt.textContent = params.saltHex;
          paramCells.elim.textContent = params.eliminated;
          paramCells.letters.textContent = params.letters;
          paramCells.addition.textContent = params.addition.toString();
          paramCells.pointer.textContent = params.pointer.toString();
          paramCells.producer.textContent = params.producer.toString();
          paramCells.left.textContent = params.leftIntroducer.toString();
          paramCells.right.textContent = params.rightIntroducer.toString();
          paramCells.step.textContent = params.step;
          paramCells.mode.textContent = mode;
          paramCells.shuffle.textContent = doShuffle ? '打乱' : '原始';

          const steps = computeSteps(plaintext, params);
          if (steps.length === 0) {
            demonstrator.innerHTML = '<p style="padding:16px;">无字符</p>';
            return;
          }

          const colspan = mode === 'DM' ? 3 : 2;
          const rowLabels = [
            '明文序列', '明文字符', 'Unicode', 'uIndex',
            'newIndex', 'Ad', '24进制', '码位', mode
          ];

          let html = '<table class="steps"><thead><tr><th></th>';
          steps.forEach((_, idx) => {
            html += `<th colspan="${colspan}">${idx + 1}</th>`;
          });
          html += '</tr></thead><tbody>';

          for (let r = 0; r < 9; r++) {
            html += '<tr>';
            html += `<td class="row-label">${rowLabels[r]}</td>`;
            if (r === 7) { // 码位行
              steps.forEach(step => {
                step.codeUnits.forEach(unit => {
                  html += `<td>${unit}</td>`;
                });
              });
            } else if (r === 8) { // 映射行
              steps.forEach(step => {
                step.mapped.forEach(m => {
                  html += `<td class="mapped-cell">${m}</td>`;
                });
              });
            } else {
              steps.forEach(step => {
                let value = '';
                switch (r) {
                  case 0: value = step.index; break;
                  case 1: value = step.char; break;
                  case 2: value = step.unicode; break;
                  case 3: value = step.uIndex; break;
                  case 4: value = step.newIndex; break;
                  case 5: value = step.Ad; break;
                  case 6: value = step.base24; break;
                }
                html += `<td colspan="${colspan}">${value}</td>`;
              });
            }
            html += '</tr>';
          }
          html += '</tbody></table>';
          demonstrator.innerHTML = html;

          // 应用当前字体大小
          const tables = demonstrator.getElementsByTagName('table');
          for (const tbl of tables) {
            tbl.style.fontSize = fontSizeSlider.value + 'px';
          }
        } catch (e) {
          console.error(e);
          demonstrator.innerHTML = `<p style="padding:16px; color:red;">计算错误: ${e.message}</p>`;
        }
      }

      function scheduleUpdate() {
        clearTimeout(updateTimer);
        updateTimer = setTimeout(updateDisplay, 300);
      }

      passwordInput.addEventListener('input', scheduleUpdate);
      plaintextInput.addEventListener('input', scheduleUpdate);
      for (const radio of modeRadios) radio.addEventListener('change', scheduleUpdate);
      shuffleCheck.addEventListener('change', scheduleUpdate);

      fontSizeSlider.addEventListener('input', () => {
        fontSizeValue.textContent = fontSizeSlider.value + 'px';
        const tables = demonstrator.getElementsByTagName('table');
        for (const tbl of tables) {
          tbl.style.fontSize = fontSizeSlider.value + 'px';
        }
      });

      fontSizeValue.textContent = fontSizeSlider.value + 'px';
      updateDisplay();
    })();
  </script>
</body>

</html>
